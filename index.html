<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertidor Excel - Pronósticos Bahías</title>
    <!-- Se reemplaza SheetJS por ExcelJS para mantener fórmulas y formatos intactos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        :root {
            --navy-primary: #001d3d;
            --navy-secondary: #003566;
            --gold-accent: #ffc300;
            --gold-hover: #ffd60a;
            --text-white: #ffffff;
            --text-gray: #a3bac3;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--navy-primary);
            background-image: radial-gradient(circle at top right, #003566 0%, #000814 100%);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: var(--card-bg);
            border: 1px solid rgba(255, 195, 0, 0.2);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
        }

        h1 {
            text-align: center;
            color: var(--gold-accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--gold-accent);
            padding-bottom: 10px;
        }

        .file-section {
            background: var(--navy-secondary);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            border: 1px solid rgba(255, 195, 0, 0.1);
        }

        .file-group { display: flex; flex-direction: column; gap: 8px; }

        label { font-weight: bold; color: var(--gold-accent); font-size: 13px; }

        input[type="file"] {
            color: var(--text-gray);
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 6px;
            border: 1px dashed var(--gold-accent);
        }

        .grid-zonas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .zona-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--gold-accent);
            position: relative;
        }

        textarea {
            width: 100%; height: 120px; background: #fff; color: #1a1a1a;
            border: none; padding: 10px; border-radius: 5px; font-family: monospace;
            font-size: 12px; resize: none; box-sizing: border-box;
        }

        .status-badge {
            background: var(--gold-accent); color: var(--navy-primary);
            font-size: 10px; font-weight: bold; padding: 2px 8px;
            border-radius: 4px; position: absolute; top: 15px; right: 15px; display: none;
        }

        .btn-grande {
            background: var(--gold-accent); color: var(--navy-primary);
            border: none; padding: 18px; width: 100%; border-radius: 8px;
            font-weight: 800; font-size: 16px; text-transform: uppercase;
            cursor: pointer; margin-top: 30px; transition: 0.3s;
        }

        .btn-grande:hover { background: var(--gold-hover); transform: translateY(-2px); }

        .firma {
            margin-top: 30px; text-align: center; font-size: 11px; color: var(--text-gray);
            border-top: 1px solid rgba(163, 186, 195, 0.2); padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Convertidor Excel - Pronósticos Bahías</h1>
    
    <div class="file-section">
        <div class="file-group">
            <label>1. PLANTILLA EXCEL (10.- CenMeteoPUERTOMONTT_PLANTILLA):</label>
            <input type="file" id="inputExcel" accept=".xlsx">
        </div>
        <div class="file-group">
            <label>2. SUBIR TXTS:</label>
            <input type="file" id="inputTxts" accept=".txt" multiple onchange="cargarArchivos(this)">
        </div>
    </div>

    <div class="grid-zonas">
        <div class="zona-card"><h3>Maullín</h3><span id="b_maullin72" class="status-badge">OK</span><textarea id="txt_maullin72"></textarea></div>
        <div class="zona-card"><h3>Chacao</h3><span id="b_chacao72" class="status-badge">OK</span><textarea id="txt_chacao72"></textarea></div>
        <div class="zona-card"><h3>Puerto Montt</h3><span id="b_pmontt72" class="status-badge">OK</span><textarea id="txt_pmontt72"></textarea></div>
        <div class="zona-card"><h3>Boca del Guafo</h3><span id="b_guafo72" class="status-badge">OK</span><textarea id="txt_guafo72"></textarea></div>
        <div class="zona-card"><h3>Chacabuco</h3><span id="b_chacabuco72" class="status-badge">OK</span><textarea id="txt_chacabuco72"></textarea></div>
        <div class="zona-card"><h3>Golfo de Penas</h3><span id="b_golfopenas72" class="status-badge">OK</span><textarea id="txt_golfopenas72"></textarea></div>
        <div class="zona-card"><h3>Melinka</h3><span id="b_melinka72" class="status-badge">OK</span><textarea id="txt_melinka72"></textarea></div>
    </div>

    <button class="btn-grande" id="btnGenerar" onclick="procesarTodo()">Generar Excel</button>

    <div class="firma">
        <strong>SISTEMA DE PROCESAMIENTO METEOROLÓGICO</strong><br>
        Creado por Cabo 1º (Met.) Francisco Salas Muñoz - 2026
    </div>
</div>

<script>
    const meses = ["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
    const mapaAlias = {
        "penas72": "txt_golfopenas72", "golfopenas72": "txt_golfopenas72",
        "quellonmelinka72": "txt_melinka72", "melinka72": "txt_melinka72",
        "maullin72": "txt_maullin72", "chacao72": "txt_chacao72",
        "pmontt72": "txt_pmontt72", "guafo72": "txt_guafo72", "chacabuco72": "txt_chacabuco72"
    };

    function cargarArchivos(input) {
        Array.from(input.files).forEach(file => {
            const nombre = file.name.toLowerCase().replace(".txt", "");
            const id = mapaAlias[nombre];
            if (id) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById(id).value = e.target.result;
                    document.getElementById(id.replace("txt_", "b_")).style.display = "block";
                };
                reader.readAsText(file);
            }
        });
    }

    function limpiarTexto(t) {
        if (!t) return "";
        let l = t.trim().replace(/,$/, "");
        if (l.endsWith(".") && !/\d$/.test(l.slice(-2, -1))) l = l.slice(0, -1);
        l = l.trim().replace(/\s+/g, " ");
        // Ajuste para normalizar el punto cardinal
        l = l.replace(/\bNW\b/g, "Norweste"); 
        return l;
    }

    function obtenerNombreDia(numStr) {
        const dias = ["DOMINGO", "LUNES", "MARTES", "MIERCOLES", "JUEVES", "VIERNES", "SABADO"];
        const num = parseInt(numStr);
        const hoy = new Date();
        let f = new Date(hoy.getFullYear(), hoy.getMonth(), num);
        if (num < hoy.getDate() - 10) f = new Date(hoy.getFullYear(), hoy.getMonth() + 1, num);
        return dias[f.getDay()];
    }

    async function procesarTodo() {
        const fileInput = document.getElementById("inputExcel");
        if (fileInput.files.length === 0) { alert("Sube la plantilla Excel primero."); return; }

        const btn = document.getElementById("btnGenerar");
        btn.innerText = "Procesando...";
        btn.disabled = true;

        try {
            const arrayBuffer = await fileInput.files[0].arrayBuffer();
            const wb = new ExcelJS.Workbook();
            await wb.xlsx.load(arrayBuffer);
            
            const idsHojas = ["maullin72", "chacao72", "pmontt72", "guafo72", "chacabuco72", "golfopenas72", "melinka72"];
            const mesActual = meses[new Date().getMonth()];

            idsHojas.forEach(idHoja => {
                const ws = wb.getWorksheet(idHoja);
                if (!ws) return;

                // 1. LIMPIEZA DE CELDAS (ExcelJS mantiene el formato de la celda intacto)
                const celdasALimpiar = [
                    "B2","B3","B4","B5","B7","C7","D7","E7","F7","G7","H7","I7","J7","K7",
                    "B8","B9","B10","B11","B12","C11","C12",
                    "B13","B14","C14","D14","E14","F14","G14","H14","I14","J14","K14",
                    "B16","C16","D16","B17","B18","C18","D18","E18","F18","G18","H18","I18","J18","K18",
                    "B19","B20","B22","C22","D22","B23","B24","C24","D24","E24","F24","G24","H24","I24","J24","K24",
                    "B25","B26"
                ];
                celdasALimpiar.forEach(r => { 
                    const cell = ws.getCell(r);
                    if(cell) cell.value = ""; 
                });

                // 2. INSERCIÓN DE ESPACIOS FICTICIOS
                const celdasConEspacios = [
                    "F7","G7","H7","J7","K7",
                    "F14","G14","H14","J14","K14",
                    "F18","G18","H18","J18","K18",
                    "F24","G24","H24","J24","K24"
                ];
                celdasConEspacios.forEach(ref => {
                    const cell = ws.getCell(ref);
                    if(cell) cell.value = "  ";
                });

                const texto = document.getElementById("txt_" + idHoja).value.trim();
                if (!texto) return;

                // 3. EXTRACCIÓN DE DATOS
                const mUV = texto.match(/INDICE DE RADIACION ULTRAVIOLETA:\s*([\s\S]*?)(?=\r?\n|APRECIACION|VALIDO|$)/i);
                if (mUV) ws.getCell("B10").value = limpiarTexto(mUV[1]);

                const mCab = texto.match(/VALIDO DESDE\s*(\d{2})/i);
                if (mCab) {
                    ws.getCell("B2").value = obtenerNombreDia(mCab[1]);
                    ws.getCell("B3").value = parseInt(mCab[1]);
                    ws.getCell("B4").value = mesActual;
                }

                const mSit = texto.match(/SITUACION SINOPTICA:\s*([\s\S]*?)(?=PRONOSTICO)/i);
                if (mSit) ws.getCell("B5").value = limpiarTexto(mSit[1]);

                const mPro = texto.match(/PRONOSTICO:\s*([\s\S]*?)(?=TEMPERATURA|PRONOSTICO VALIDO|EMITIDO|$)/i);
                if (mPro) {
                    const p = mPro[1];
                    ws.getCell("B7").value = limpiarTexto(p.split(",")[0]);
                    const v1 = p.match(/VIS\s+([\s\S]+?)(?=VIENTO|MAR)/i);
                    const v2 = p.match(/VIENTO\s+([\s\S]+?)(?=MAR|$)/i);
                    const v3 = p.match(/MAR\s+([\s\S]+?)(?=\.[\s\r\n]*$|\r?\n|$)/i);
                    if (v1) ws.getCell("C7").value = limpiarTexto(v1[1]);
                    if (v2) ws.getCell("E7").value = limpiarTexto(v2[1]);
                    if (v3) ws.getCell("I7").value = limpiarTexto(v3[1]);
                }

                const tMin1 = texto.match(/MINIMA\s*PROBABLE\s*[:\-]?\s*(\d+\s*°C)/i);
                const tMax1 = texto.match(/MAXIMA\s*PROBABLE\s*[:\-]?\s*(\d+\s*°C)/i);
                if (tMin1) ws.getCell("B8").value = tMin1[1];
                if (tMax1) ws.getCell("B9").value = tMax1[1];

                const mNoc = texto.match(/PRONOSTICO VALIDO DESDE\s*(\d{2})\d{4}\s*HASTA\s*(\d{2})\d{4}[\s\S]*HORA LOCAL\.\s*([\s\S]*?)(?=(?:LUNES|MARTES|MIERCOLES|JUEVES|VIERNES|SABADO|DOMINGO)\s*\d{2}|MET011|EMITIDO|$)/i);
                if (mNoc) {
                    ws.getCell("B11").value = obtenerNombreDia(mNoc[1]) + " " + mNoc[1];
                    ws.getCell("B12").value = obtenerNombreDia(mNoc[2]) + " " + mNoc[2];
                    ws.getCell("C11").value = "20:00"; 
                    ws.getCell("C12").value = "08:00";
                    const cn = mNoc[3];
                    ws.getCell("B13").value = limpiarTexto(cn.split(",")[0]);
                    const vn1 = cn.match(/VIS\s+([\s\S]+?)(?=VIENTO|MAR)/i);
                    const vn2 = cn.match(/VIENTO\s+([\s\S]+?)(?=MAR|$)/i);
                    const vn3 = cn.match(/MAR\s+([\s\S]+?)(?=\.[\s\r\n]*$|\r?\n|$)/i);
                    if (vn1) ws.getCell("C14").value = limpiarTexto(vn1[1]);
                    if (vn2) ws.getCell("E14").value = limpiarTexto(vn2[1]);
                    if (vn3) ws.getCell("I14").value = limpiarTexto(vn3[1]);
                    if (idHoja !== "melinka72" && cn.split(",").length >= 2) ws.getCell("B14").value = limpiarTexto(cn.split(",")[1]);
                }

                const regexDias = /(LUNES|MARTES|MIERCOLES|JUEVES|VIERNES|SABADO|DOMINGO)\s+(\d{2})[\s.]*SITUACION SINOPTICA:\s*([\s\S]*?)\s*PRONOSTICO:\s*([\s\S]*?)(?=(?:LUNES|MARTES|MIERCOLES|JUEVES|VIERNES|SABADO|DOMINGO)\s+\d{2}|MET011|EMITIDO|$)/gi;
                let match, contador = 0;
                while ((match = regexDias.exec(texto)) !== null) {
                    contador++; if (contador > 2) break;
                    let fBase = (contador === 1) ? 16 : 22;
                    let fPron = (contador === 1) ? 18 : 24;
                    ws.getCell("B" + fBase).value = match[1];
                    ws.getCell("C" + fBase).value = parseInt(match[2]);
                    ws.getCell("D" + fBase).value = mesActual;
                    ws.getCell("B" + (fBase + 1)).value = limpiarTexto(match[3]);
                    const pf = match[4];
                    ws.getCell("B" + fPron).value = limpiarTexto(pf.split(",")[0]);
                    const vf1 = pf.match(/VIS\s+([\s\S]+?)(?=VIENTO|MAR)/i);
                    const vf2 = pf.match(/VIENTO\s+([\s\S]+?)(?=MAR|$)/i);
                    const vf3 = pf.match(/MAR\s+([\s\S]+?)(?=\.[\s\r\n]*$|\r?\n|$)/i);
                    if (vf1) ws.getCell("C" + fPron).value = limpiarTexto(vf1[1]);
                    if (vf2) ws.getCell("E" + fPron).value = limpiarTexto(vf2[1]);
                    if (vf3) ws.getCell("I" + fPron).value = limpiarTexto(vf3[1]);
                    const tMinF = pf.match(/MINIMA\s*PROBABLE\s*[:\-]?\s*(\d+\s*°C)/i);
                    const tMaxF = pf.match(/MAXIMA\s*PROBABLE\s*[:\-]?\s*(\d+\s*°C)/i);
                    if (tMinF) ws.getCell("B" + (fBase + 3)).value = tMinF[1];
                    if (tMaxF) ws.getCell("B" + (fBase + 4)).value = tMaxF[1];
                }
            });

            // Guardar usando ExcelJS (mantiene el archivo exactamente igual en las hojas no tocadas)
            const buffer = await wb.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "10.- CenMeteoPUERTOMONTT.xlsx";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            alert("✅ Procesado finalizado con éxito. Las carpetas restantes se mantuvieron intactas.");

        } catch (error) {
            console.error(error);
            alert("Hubo un problema procesando el archivo: " + error.message);
        } finally {
            btn.innerText = "Generar Excel";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
